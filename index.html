<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chrome Dino — Ultimate Edition</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="gameWrap">
    <div class="hud">
      <div class="panel title-panel">
        <div class="title">Dino — Ultimate</div>
        <div class="small muted">Improved physics, power-ups, day/night, particles</div>
      </div>
      <div class="stats-panel">
        <div class="panel small" id="scorePanel">Score: 0 &nbsp;|&nbsp; Best: 0</div>
        <div class="panel small" id="speedPanel">Speed: 0</div>
        <div class="panel small" id="timePanel">Time: 0s</div>
        <div class="panel controls">
          <button id="muteBtn" class="btn">Mute</button>
        </div>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="game"></canvas>
      
      <div id="startOverlay" class="overlay active">
        <div class="overlay-card">
          <h1>Ready to Run?</h1>
          <p>Press <strong>Space</strong>, <strong>Up</strong>, or <strong>Tap</strong> to start.</p>
          <p class="small muted">Duck with Down or S. Double tap/click for quick jump.</p>
          <button id="startBtn" class="btn btn-large">Start Game</button>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay">
        <div class="overlay-card">
          <h1>GAME OVER</h1>
          <p id="finalScoreDisplay">Score: 0</p>
          <button id="restartBtn" class="btn btn-large">Try Again</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
